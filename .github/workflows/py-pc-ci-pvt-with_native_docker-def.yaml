# py-pc-ci-pvt-with_native_docker-def.yaml

name: py-pc-ci-pvt-with_native_docker-def

on:
  workflow_call:
    secrets:
      GH_REPO_ACCESS_BEE_MASTER:
        required: true
      GH_REPO_ACCESS_RTE_MASTER:
        required: true
      AUTHZ_SERVICE_CLIENT_ID:
        required: true
      AUTHZ_SERVICE_CLIENT_SECRET:
        required: true
      COMMIT_BATCH_SIZE:
        required: true
      GOOGLE_CREDENTIALS_PATH:
        required: true
      GOOGLE_CREDENTIALS_CONTENTS:
        required: true
      DEV_E2E_MYSQL_TCP_PORT:
        required: true
      DEV_AUTO_MYSQL_HOST:
        required: true
      DEV_AUTO_MYSQL_TCP_PORT:
        required: true
      DEV_AUTO_OVERRIDE:
        required: true
      ES_SERVICE_CLIENT_ID:
        required: true
      ES_SERVICE_CLIENT_SECRET:
        required: true
      INSTALLER_USERID:
        required: true
      INSTALLER_PWD:
        required: true
      LOG_BACKUP_COUNT:
        required: true
      LOG_DIR:
        required: true
      LOG_LEVEL_CONSOLE:
        required: true
      LOG_LEVEL_FILE:
        required: true
      MYSQL_DATABASE:
        required: true
      MYSQL_HOST:
        required: true
      MYSQL_PASSWORD:
        required: true
      MYSQL_PWD:
        required: true
      MYSQL_ROOT_PASSWORD:
        required: true
      MYSQL_ROOT_USER:
        required: true
      MYSQL_TCP_PORT:
        required: true
      MYSQL_TCP_PORT_EXTERNAL:
        required: true
      MYSQL_TCP_PORT_LOCAL_PROD:
        required: true
      MYSQL_USER:
        required: true
      RELEASE_EMAIL_USER:
        required: true
      RELEASE_EMAIL_PASSWORD:
        required: true
      PROJECT_NAME:
        required: true
      RTEAPI_BASE_IMAGES_PATH:
        required: true
      RTEAPI_ES_PRESENCE_TTL_S:
        required: true
      RTEAPI_ES_SSE_HEARTBEAT_S:
        required: true
      RTEAPI_ES_SSE_PUBSUB_POLL_TIMEOUT_S:
        required: true
      RTEAPI_ES_WS_HEARTBEAT_S:
        required: true
      RTEAPI_ES_WS_PUBSUB_POLL_TIMEOUT_S:
        required: true
      RTEAPI_LOG_REQUESTS:
        required: true
      SOCKET_EVENT_SERVICE:
        required: true
      SOCKET_FIDE_PARSER_SERVICE:
        required: true
      SOCKET_RTEAPI:
        required: true
      UMS_SERVICE_CLIENT_ID:
        required: true
      UMS_SERVICE_CLIENT_SECRET:
        required: true
      VENV_ENVIRONMENT:
        required: true
      MYSQL_IMAGE:
        required: true
jobs:
  CI:
    runs-on: ${{matrix.os}}
    env:
      AUTHZ_SERVICE_CLIENT_ID: ${{secrets.AUTHZ_SERVICE_CLIENT_ID }}
      AUTHZ_SERVICE_CLIENT_SECRET: ${{secrets.AUTHZ_SERVICE_CLIENT_SECRET }}
      COMMIT_BATCH_SIZE: ${{secrets.COMMIT_BATCH_SIZE }}
      DEV_E2E_MYSQL_TCP_PORT: ${{secrets.DEV_E2E_MYSQL_TCP_PORT }}
      DEV_AUTO_MYSQL_HOST: ${{secrets.DEV_AUTO_MYSQL_HOST }}
      DEV_AUTO_MYSQL_TCP_PORT: ${{secrets.DEV_AUTO_MYSQL_TCP_PORT }}
      DEV_AUTO_OVERRIDE: ${{secrets.DEV_AUTO_OVERRIDE }}
      ES_SERVICE_CLIENT_ID: ${{secrets.ES_SERVICE_CLIENT_ID }}
      ES_SERVICE_CLIENT_SECRET: ${{secrets.ES_SERVICE_CLIENT_SECRET }}
      GH_REPO_ACCESS_BEE_MASTER: ${{secrets.GH_REPO_ACCESS_BEE_MASTER }}
      GH_REPO_ACCESS_RTE_MASTER: ${{secrets.GH_REPO_ACCESS_RTE_MASTER }}
      GOOGLE_CREDENTIALS_PATH: ${{ secrets.GOOGLE_CREDENTIALS_PATH }}
      INSTALLER_USERID: ${{secrets.INSTALLER_USERID }}
      INSTALLER_PWD: ${{secrets.INSTALLER_PWD }}
      LOG_BACKUP_COUNT: ${{secrets.LOG_BACKUP_COUNT }}
      LOG_DIR: ${{secrets.LOG_DIR }}
      LOG_LEVEL_CONSOLE: ${{secrets.LOG_LEVEL_CONSOLE }}
      LOG_LEVEL_FILE: ${{secrets.LOG_LEVEL_FILE }}
      MYSQL_DATABASE: ${{secrets.MYSQL_DATABASE }}
      MYSQL_HOST: ${{secrets.MYSQL_HOST }}
      MYSQL_IMAGE: ${{secrets.MYSQL_IMAGE }}
      MYSQL_PASSWORD: ${{secrets.MYSQL_PASSWORD}}
      MYSQL_PWD: ${{secrets.MYSQL_PWD}}
      MYSQL_ROOT_PASSWORD: ${{secrets.MYSQL_ROOT_PASSWORD}}
      MYSQL_ROOT_USER: ${{secrets.MYSQL_ROOT_USER }}
      MYSQL_TCP_PORT: ${{secrets.MYSQL_TCP_PORT }}
      MYSQL_TCP_PORT_EXTERNAL: ${{secrets.MYSQL_TCP_PORT_EXTERNAL }}
      MYSQL_TCP_PORT_LOCAL_PROD: ${{secrets.MYSQL_TCP_PORT_LOCAL_PROD }}
      MYSQL_USER: ${{secrets.MYSQL_USER}}
      PROJECT_NAME: ${{secrets.PROJECT_NAME }}
      RELEASE_EMAIL_USER: ${{secrets.RELEASE_EMAIL_USER }}
      RELEASE_EMAIL_PASSWORD: ${{secrets.RELEASE_EMAIL_PASSWORD }}
      RTEAPI_BASE_IMAGES_PATH: ${{secrets.RTEAPI_BASE_IMAGES_PATH }}
      RTEAPI_ES_PRESENCE_TTL_S: ${{secrets.RTEAPI_ES_PRESENCE_TTL_S }}
      RTEAPI_ES_SSE_HEARTBEAT_S: ${{secrets.RTEAPI_ES_SSE_HEARTBEAT_S }}
      RTEAPI_ES_SSE_PUBSUB_POLL_TIMEOUT_S: ${{secrets.RTEAPI_ES_SSE_PUBSUB_POLL_TIMEOUT_S }}
      RTEAPI_ES_WS_HEARTBEAT_S: ${{secrets.RTEAPI_ES_WS_HEARTBEAT_S }}
      RTEAPI_ES_WS_PUBSUB_POLL_TIMEOUT_S: ${{secrets.RTEAPI_ES_WS_PUBSUB_POLL_TIMEOUT_S }}
      RTEAPI_LOG_REQUESTS: ${{secrets.RTEAPI_LOG_REQUESTS }}
      SOCKET_EVENT_SERVICE: ${{secrets.SOCKET_EVENT_SERVICE }}
      SOCKET_FIDE_PARSER_SERVICE: ${{secrets.SOCKET_FIDE_PARSER_SERVICE }}
      SOCKET_RTEAPI: ${{secrets.SOCKET_RTEAPI }}
      UMS_SERVICE_CLIENT_ID: ${{secrets.UMS_SERVICE_CLIENT_ID }}
      UMS_SERVICE_CLIENT_SECRET: ${{secrets.UMS_SERVICE_CLIENT_SECRET }}
      VENV_ENVIRONMENT: ${{secrets.VENV_ENVIRONMENT }}

    strategy:
      fail-fast: true
      matrix:
        #        python-version: ['3.8', '3.9', '3.10', '3.11']
        python-version: ["3.13"]
        #        os: ['ubuntu-latest', 'windows-latest', 'macos-latest']
        os: ["ubuntu-latest"]

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - name: Start Docker daemon
        run: |
          sudo systemctl start docker
          sudo systemctl enable docker
          docker --version
          docker ps

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Configure Poetry
        run: |
          poetry config keyring.enabled false
          poetry config http-basic.BEE __token__ ${{ secrets.GH_REPO_ACCESS_BEE_MASTER }}
          poetry config http-basic.RTE __token__ ${{ secrets.GH_REPO_ACCESS_RTE_MASTER }}
          poetry config http-basic.rtecommon __token__ ${{ secrets.GH_REPO_ACCESS_RTE_MASTER }}
          poetry config http-basic.rtedb __token__ ${{ secrets.GH_REPO_ACCESS_RTE_MASTER }}
          poetry config http-basic.rteapi __token__ ${{ secrets.GH_REPO_ACCESS_RTE_MASTER }}
          poetry config http-basic.fideratinglist __token__ ${{ secrets.GH_REPO_ACCESS_RTE_MASTER }}
          poetry config http-basic.fidewebtourparser __token__ ${{ secrets.GH_REPO_ACCESS_RTE_MASTER }}
          poetry config http-basic.event_service __token__ ${{ secrets.GH_REPO_ACCESS_RTE_MASTER }}
          poetry config http-basic.sample_data_factory __token__ ${{ secrets.GH_REPO_ACCESS_RTE_MASTER }}

      - name: Install dependencies
        run: |
          poetry install --with dev

      # Create Google credentials file (required)
      - name: Create Google credentials file
        env:
          GOOGLE_CREDENTIALS_CONTENTS: ${{ secrets.GOOGLE_CREDENTIALS_CONTENTS }}
        run: |
          if [ -z "$GOOGLE_CREDENTIALS_CONTENTS" ]; then
            echo "ERROR: GOOGLE_CREDENTIALS_CONTENTS secret is not set or empty." >&2
            exit 1
          fi

          if [ -n "$GOOGLE_CREDENTIALS_PATH" ]; then
            CREDENTIALS_PATH="$GOOGLE_CREDENTIALS_PATH"
          else
            CREDENTIALS_PATH="$HOME/.config/gcloud/application_default_credentials.json"
          fi

          CREDENTIALS_DIR=$(dirname "$CREDENTIALS_PATH")
          mkdir -p "$CREDENTIALS_DIR"

          printf '%s' "$GOOGLE_CREDENTIALS_CONTENTS" > "$CREDENTIALS_PATH"
          chmod 600 "$CREDENTIALS_PATH"
          echo "Created Google credentials file at: $CREDENTIALS_PATH"
          echo "File size: $(wc -c < "$CREDENTIALS_PATH") bytes"

      # Create the .env file that docker compose expects
      - name: Create .env from GitHub Secrets
        run: |
          cat > .env <<'EOF'
          GH_REPO_ACCESS_BEE_MASTER=${{ secrets.GH_REPO_ACCESS_BEE_MASTER }}
          GH_REPO_ACCESS_RTE_MASTER=${{ secrets.GH_REPO_ACCESS_RTE_MASTER }}
          AUTHZ_SERVICE_CLIENT_ID=${{ secrets.AUTHZ_SERVICE_CLIENT_ID }}
          AUTHZ_SERVICE_CLIENT_SECRET=${{ secrets.AUTHZ_SERVICE_CLIENT_SECRET }}
          COMMIT_BATCH_SIZE=${{ secrets.COMMIT_BATCH_SIZE }}
          DEV_E2E_MYSQL_TCP_PORT=${{ secrets.DEV_E2E_MYSQL_TCP_PORT }}
          DEV_AUTO_MYSQL_HOST=${{ secrets.DEV_AUTO_MYSQL_HOST }}
          DEV_AUTO_MYSQL_TCP_PORT=${{ secrets.DEV_AUTO_MYSQL_TCP_PORT }}
          DEV_AUTO_OVERRIDE=${{ secrets.DEV_AUTO_OVERRIDE }}
          ES_SERVICE_CLIENT_ID=${{ secrets.ES_SERVICE_CLIENT_ID }}
          ES_SERVICE_CLIENT_SECRET=${{ secrets.ES_SERVICE_CLIENT_SECRET }}
          INSTALLER_USERID=${{ secrets.INSTALLER_USERID }}
          INSTALLER_PWD=${{ secrets.INSTALLER_PWD }}
          LOG_BACKUP_COUNT=${{ secrets.LOG_BACKUP_COUNT }}
          LOG_DIR=${{ secrets.LOG_DIR }}
          LOG_LEVEL_CONSOLE=${{ secrets.LOG_LEVEL_CONSOLE }}
          LOG_LEVEL_FILE=${{ secrets.LOG_LEVEL_FILE }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_HOST=${{ secrets.MYSQL_HOST }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_PWD=${{ secrets.MYSQL_PWD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_ROOT_USER=${{ secrets.MYSQL_ROOT_USER }}
          MYSQL_TCP_PORT=${{ secrets.MYSQL_TCP_PORT }}
          MYSQL_TCP_PORT_EXTERNAL=${{ env.MYSQL_TCP_PORT_EXTERNAL }}
          MYSQL_TCP_PORT_LOCAL_PROD=${{ env.MYSQL_TCP_PORT_LOCAL_PROD }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          PROJECT_NAME=${{ env.PROJECT_NAME }}
          RTEAPI_BASE_IMAGES_PATH=${{ secrets.RTEAPI_BASE_IMAGES_PATH }}
          RTEAPI_ES_PRESENCE_TTL_S=${{ secrets.RTEAPI_ES_PRESENCE_TTL_S }}
          RTEAPI_ES_SSE_HEARTBEAT_S=${{ secrets.RTEAPI_ES_SSE_HEARTBEAT_S }}
          RTEAPI_ES_SSE_PUBSUB_POLL_TIMEOUT_S=${{ secrets.RTEAPI_ES_SSE_PUBSUB_POLL_TIMEOUT_S }}
          RTEAPI_ES_WS_HEARTBEAT_S=${{ secrets.RTEAPI_ES_WS_HEARTBEAT_S }}
          RTEAPI_ES_WS_PUBSUB_POLL_TIMEOUT_S=${{ secrets.RTEAPI_ES_WS_PUBSUB_POLL_TIMEOUT_S }}
          RTEAPI_LOG_REQUESTS=${{ secrets.RTEAPI_LOG_REQUESTS }}
          RELEASE_EMAIL_USER=${{ secrets.RELEASE_EMAIL_USER }}
          RELEASE_EMAIL_PASSWORD=${{ secrets.RELEASE_EMAIL_PASSWORD }}
          SOCKET_EVENT_SERVICE=${{secrets.SOCKET_EVENT_SERVICE }}
          SOCKET_FIDE_PARSER_SERVICE=${{secrets.SOCKET_FIDE_PARSER_SERVICE }}
          SOCKET_RTEAPI=${{secrets.SOCKET_RTEAPI }}
          UMS_SERVICE_CLIENT_ID=${{ secrets.UMS_SERVICE_CLIENT_ID }}
          UMS_SERVICE_CLIENT_SECRET=${{ secrets.UMS_SERVICE_CLIENT_SECRET }}
          VENV_ENVIRONMENT=${{ secrets.VENV_ENVIRONMENT }}
          MYSQL_IMAGE=${{ secrets.MYSQL_IMAGE }}
          EOF
          sed -i 's/^[[:space:]]*//' .env

      # - name: Debug - Verify environment variables
      #   run: |
      #     echo "=== Checking shell environment variables ==="
      #     echo "MYSQL_ROOT_PASSWORD length: ${#MYSQL_ROOT_PASSWORD}"
      #     echo "MYSQL_ROOT_PASSWORD is set: $( [ -n "$MYSQL_ROOT_PASSWORD" ] && echo 'YES' || echo 'NO' )"
      #     echo "MYSQL_PASSWORD length: ${#MYSQL_PASSWORD}"
      #     echo "MYSQL_USER: $MYSQL_USER"
      #     echo "MYSQL_DATABASE: $MYSQL_DATABASE"
      #     echo "MYSQL_HOST: $MYSQL_HOST"
      #     echo "MYSQL_TCP_PORT: $MYSQL_TCP_PORT"
      #     echo ""
      #     echo "=== .env file contents (values masked by GitHub) ==="
      #     cat .env
      #     echo ""
      #     echo "=== .env file line count ==="
      #     wc -l .env
      #     echo ""
      #     echo "=== Checking Python os.environ ==="
      #     poetry run python -c "
      #     import os
      #     print(f\"os.environ MYSQL_ROOT_PASSWORD length: {len(os.environ.get('MYSQL_ROOT_PASSWORD', ''))}\")
      #     print(f\"os.environ MYSQL_PASSWORD length: {len(os.environ.get('MYSQL_PASSWORD', ''))}\")
      #     print(f\"os.environ MYSQL_USER: {os.environ.get('MYSQL_USER', 'NOT SET')}\")
      #     "
      #     echo ""
      #     echo "=== Checking if repo has .env file committed ==="
      #     if [ -f ".env.example" ]; then echo ".env.example exists"; cat .env.example; else echo "No .env.example"; fi
      #     git ls-files | grep -E "^\.env" || echo "No .env files tracked in git"
      #     echo ""
      #     echo "=== Checking actual Python settings object ==="
      #     poetry run python -c "
      #     from dma.configs.settings import env_settings
      #     print(f'env_settings.MYSQL_ROOT_PASSWORD length: {len(env_settings.MYSQL_ROOT_PASSWORD)}')
      #     print(f'env_settings.MYSQL_ROOT_PASSWORD is empty: {env_settings.MYSQL_ROOT_PASSWORD == \"\"}')
      #     print(f'env_settings.MYSQL_PASSWORD length: {len(env_settings.MYSQL_PASSWORD)}')
      #     print(f'env_settings.MYSQL_USER: {env_settings.MYSQL_USER}')
      #     print(f'env_settings.MYSQL_HOST: {env_settings.MYSQL_HOST}')
      #     "
      #     echo ""
      #     echo "=== Checking password for special characters ==="
      #     poetry run python -c "
      #     import os
      #     pwd = os.environ.get('MYSQL_ROOT_PASSWORD', '')
      #     print(f'Has leading whitespace: {pwd != pwd.lstrip()}')
      #     print(f'Has trailing whitespace: {pwd != pwd.rstrip()}')
      #     print(f'Contains dollar sign: {chr(36) in pwd}')
      #     print(f'Contains backslash: {chr(92) in pwd}')
      #     print(f'Contains single quote: {chr(39) in pwd}')
      #     print(f'Contains double quote: {chr(34) in pwd}')
      #     print(f'Contains backtick: {chr(96) in pwd}')
      #     print(f'Contains exclamation: {chr(33) in pwd}')
